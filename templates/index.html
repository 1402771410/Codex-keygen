<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册控制台 - OpenAI 注册系统</title>
    <link rel="stylesheet" href="https://unpkg.com/@douyinfe/semi-ui@2.72.0/dist/css/semi.min.css">
    <link rel="stylesheet" href="/static/css/style.css?v={{ static_version }}">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>">
    <style>
        /* 注册页面特定样式 */
        .task-status-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: var(--semi-spacing-3);
            padding: var(--semi-spacing-3) var(--semi-spacing-4);
            background: var(--semi-color-bg-2);
            border-radius: var(--semi-radius-base);
            margin-bottom: var(--semi-spacing-3);
        }

        .task-status-item { text-align: center; }
        .task-status-item .label { font-size: 0.7143rem; color: var(--semi-color-text-3); margin-bottom: 2px; }
        .task-status-item .value { font-size: 0.8571rem; font-weight: 600; color: var(--semi-color-text-0); }

        .recent-accounts-table { max-height: 280px; overflow-y: auto; }
        .recent-accounts-table table { width: 100%; font-size: 0.8571rem; }
        .recent-accounts-table th, .recent-accounts-table td { padding: var(--semi-spacing-2) var(--semi-spacing-3); }

        .password-cell { font-family: var(--semi-font-mono); font-size: 0.7857rem; }
        .password-hidden { filter: blur(4px); cursor: pointer; transition: filter 0.2s; }
        .password-hidden:hover { filter: blur(0); }

        .multi-select-dropdown { position: relative; width: 100%; }

        .msd-trigger {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 32px;
            padding: 0 var(--semi-spacing-3);
            border: 1px solid var(--semi-border-color);
            border-radius: var(--semi-radius-base);
            background: var(--semi-color-bg-0);
            color: var(--semi-color-text-0);
            font-size: 0.8571rem;
            cursor: pointer;
            user-select: none;
        }

        .msd-trigger:hover { border-color: var(--semi-color-text-3); }
        .msd-arrow { font-size: 0.6429rem; color: var(--semi-color-text-3); transition: transform 0.15s; }
        .msd-dropdown.open .msd-arrow { transform: rotate(180deg); }

        .msd-list {
            display: none;
            position: absolute;
            top: calc(100% + 4px);
            left: 0;
            right: 0;
            background: var(--semi-color-bg-0);
            border: 1px solid var(--semi-border-color-light);
            border-radius: var(--semi-radius-base);
            box-shadow: var(--semi-shadow-3);
            z-index: 100;
            max-height: 140px;
            overflow-y: auto;
            padding: var(--semi-spacing-1) 0;
        }

        .msd-dropdown.open .msd-list { display: block; }

        .msd-item {
            display: flex;
            align-items: center;
            gap: var(--semi-spacing-2);
            padding: var(--semi-spacing-2) var(--semi-spacing-3);
            cursor: pointer;
            font-size: 0.8571rem;
        }

        .msd-item:hover { background: var(--semi-color-bg-2); }
        .msd-item input[type="checkbox"] { margin: 0; cursor: pointer; }
        .msd-empty { padding: var(--semi-spacing-2) var(--semi-spacing-3); color: var(--semi-color-text-3); font-size: 0.7857rem; }
    </style>
</head>
<body>
    <!-- 新布局：左侧导航栏 Shell -->
    <div class="app-shell">
        <!-- 左侧导航栏 -->
        <aside class="sidebar">
            <div class="sidebar-brand">
                <div class="sidebar-brand-icon">🚀</div>
                <span class="sidebar-brand-text">OpenAI 注册</span>
            </div>
            
            <nav class="sidebar-nav">
                <div class="sidebar-section">
                    <div class="sidebar-section-title">控制台</div>
                    <a href="/" class="sidebar-link active">
                        <span class="sidebar-link-icon">📝</span>
                        <span>注册</span>
                    </a>
                    <a href="/accounts" class="sidebar-link">
                        <span class="sidebar-link-icon">📋</span>
                        <span>账号管理</span>
                    </a>
                    <a href="/email-services" class="sidebar-link">
                        <span class="sidebar-link-icon">📮</span>
                        <span>邮箱服务</span>
                    </a>
                </div>
                
                <div class="sidebar-section">
                    <div class="sidebar-section-title">工具</div>
                    <a href="/payment" class="sidebar-link">
                        <span class="sidebar-link-icon">💳</span>
                        <span>支付升级</span>
                    </a>
                    <a href="/settings" class="sidebar-link">
                        <span class="sidebar-link-icon">⚙️</span>
                        <span>系统设置</span>
                    </a>
                    <a href="/logs" class="sidebar-link">
                        <span class="sidebar-link-icon">🧾</span>
                        <span>日志中心</span>
                    </a>
                </div>
            </nav>
            
            <div class="sidebar-footer">
                <button type="button" class="theme-toggle-btn" onclick="theme.toggle()" title="切换主题" aria-label="切换主题">
                    <span data-theme-icon aria-hidden="true">🌙</span>
                </button>
                <a href="/logout" class="logout-link">退出</a>
            </div>
        </aside>

        <!-- 主内容区 -->
        <main class="main-wrapper">
            <header class="page-header-bar">
                <div class="page-title-section">
                    <h1>📝 注册控制台</h1>
                    <p>启动和管理 OpenAI 账号注册任务</p>
                </div>
            </header>

            <div class="page-content">
                <div style="display: grid; grid-template-columns: 340px 1fr; gap: var(--semi-spacing-5); align-items: start;">
                    <!-- 左侧面板 - 注册设置 -->
                    <div style="position: sticky; top: 80px;">
                        <div class="card">
                            <div class="card-header">
                                <h3>注册配置</h3>
                            </div>
                            <div class="card-body">
                                <form id="registration-form">
                                    <div class="form-group">
                                        <label for="email-service">邮箱服务</label>
                                        <select id="email-service" name="email_service" required>
                                            <option value="tempmail:default">Tempmail.lol (临时邮箱)</option>
                                        </select>
                                    </div>

                                    <div class="form-group" id="reg-mode-group">
                                        <label for="reg-mode">注册模式</label>
                                        <select id="reg-mode" name="reg_mode">
                                            <option value="single">单次注册</option>
                                            <option value="batch">批量注册</option>
                                            <option value="loop">循环注册（按时段）</option>
                                        </select>
                                    </div>

                                    <div class="form-group" id="batch-count-group" style="display: none;">
                                        <label for="batch-count">目标成功数量 (1-999999)</label>
                                        <input type="number" id="batch-count" name="batch_count" min="1" max="999999" value="5">
                                        <small style="color: var(--semi-color-text-3); font-size: 0.7857rem;">系统会持续尝试，直到成功数量达到目标（可手动取消）。</small>
                                    </div>

                                    <div id="loop-window-group" style="display: none;">
                                        <div class="form-group">
                                            <label for="loop-window-start">循环注册时间段</label>
                                            <div style="display: grid; grid-template-columns: 1fr auto 1fr; gap: var(--semi-spacing-2); align-items: center;">
                                                <input type="time" id="loop-window-start" name="loop_window_start" value="08:00">
                                                <span style="text-align: center; color: var(--semi-color-text-3);">至</span>
                                                <input type="time" id="loop-window-end" name="loop_window_end" value="23:00">
                                            </div>
                                        </div>
                                    </div>

                                    <div id="batch-options" style="display: none;">
                                        <div class="form-group">
                                            <label for="concurrency-mode">并发模式</label>
                                            <select id="concurrency-mode" name="concurrency_mode">
                                                <option value="pipeline">流水线（Pipeline）</option>
                                                <option value="parallel">并行（Parallel）</option>
                                            </select>
                                        </div>

                                        <div class="form-group">
                                            <label for="concurrency-count">并发数 (1-50)</label>
                                            <input type="number" id="concurrency-count" name="concurrency_count" min="1" max="50" value="3">
                                            <small id="concurrency-hint" style="color: var(--semi-color-text-3); font-size: 0.7857rem;">同时最多运行 N 个任务，每隔 interval 秒启动新任务</small>
                                        </div>

                                        <div id="interval-group">
                                            <div class="form-group">
                                                <label for="interval-min">最小间隔 (秒)</label>
                                                <input type="number" id="interval-min" name="interval_min" min="0" max="300" value="5">
                                            </div>
                                            <div class="form-group">
                                                <label for="interval-max">最大间隔 (秒)</label>
                                                <input type="number" id="interval-max" name="interval_max" min="1" max="600" value="30">
                                            </div>
                                        </div>
                                    </div>

                                    <div class="form-group" id="auto-upload-group">
                                        <label style="font-weight: 500; margin-bottom: var(--semi-spacing-2); display: block;">注册后自动操作</label>

                                        <label style="display: flex; align-items: center; gap: var(--semi-spacing-2); cursor: pointer;">
                                            <input type="checkbox" id="auto-upload-cpa">
                                            <span>上传到 CPA</span>
                                        </label>
                                        <div id="cpa-service-select-group" style="display:none; margin-top: var(--semi-spacing-1); margin-bottom: var(--semi-spacing-2); padding-left: var(--semi-spacing-1);">
                                            <div class="multi-select-dropdown" id="cpa-service-select"></div>
                                        </div>

                                        <label style="display: flex; align-items: center; gap: var(--semi-spacing-2); cursor: pointer; margin-top: var(--semi-spacing-1);">
                                            <input type="checkbox" id="auto-upload-sub2api">
                                            <span>上传到 Sub2API</span>
                                        </label>
                                        <div id="sub2api-service-select-group" style="display:none; margin-top: var(--semi-spacing-1); margin-bottom: var(--semi-spacing-2); padding-left: var(--semi-spacing-1);">
                                            <div class="multi-select-dropdown" id="sub2api-service-select"></div>
                                        </div>

                                        <label style="display: flex; align-items: center; gap: var(--semi-spacing-2); cursor: pointer; margin-top: var(--semi-spacing-1);">
                                            <input type="checkbox" id="auto-upload-tm">
                                            <span>上传到 Team Manager</span>
                                        </label>
                                        <div id="tm-service-select-group" style="display:none; margin-top: var(--semi-spacing-1); padding-left: var(--semi-spacing-1);">
                                            <div class="multi-select-dropdown" id="tm-service-select"></div>
                                        </div>
                                    </div>

                                    <div class="form-actions" style="flex-direction: column;">
                                        <button type="submit" class="btn btn-primary btn-lg" id="start-btn" style="width: 100%;">
                                            🚀 开始注册
                                        </button>
                                        <button type="button" class="btn btn-secondary" id="cancel-btn" disabled style="width: 100%;">
                                            取消任务
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>

                    <!-- 右侧面板 -->
                    <div style="display: flex; flex-direction: column; gap: var(--semi-spacing-4);">
                        <!-- 监控台 -->
                        <div class="card" id="console-card">
                            <div class="card-header">
                                <h3>💻 实时监控</h3>
                                <div style="display: flex; gap: var(--semi-spacing-2); align-items: center;">
                                    <span id="task-status-badge" class="status-badge pending" style="display: none;">等待中</span>
                                    <button type="button" class="btn btn-ghost btn-sm" id="clear-log-btn">清空</button>
                                </div>
                            </div>
                            <div class="card-body no-padding">
                                <div class="task-status-row" id="task-status-row" style="display: none;">
                                    <div class="task-status-item">
                                        <div class="label">任务 ID</div>
                                        <div class="value" id="task-id">-</div>
                                    </div>
                                    <div class="task-status-item">
                                        <div class="label">邮箱</div>
                                        <div class="value" id="task-email">-</div>
                                    </div>
                                    <div class="task-status-item">
                                        <div class="label">邮箱服务</div>
                                        <div class="value" id="task-service">-</div>
                                    </div>
                                    <div class="task-status-item">
                                        <div class="label">状态</div>
                                        <div class="value" id="task-status">-</div>
                                    </div>
                                </div>

                                <div id="batch-progress-section" style="display: none; padding: var(--semi-spacing-3) var(--semi-spacing-4); border-bottom: 1px solid var(--semi-border-color-light);">
                                    <div style="display: flex; justify-content: space-between; margin-bottom: var(--semi-spacing-2);">
                                        <span id="batch-progress-text">0/0</span>
                                        <span id="batch-progress-percent">0%</span>
                                    </div>
                                    <div class="progress-bar-container">
                                        <div id="progress-bar" class="progress-bar" style="width: 0%"></div>
                                    </div>
                                    <div class="batch-stats">
                                        <span>成功 <strong id="batch-success">0</strong></span>
                                        <span>失败 <strong id="batch-failed">0</strong></span>
                                        <span>剩余 <strong id="batch-remaining">0</strong></span>
                                    </div>
                                </div>

                                <div id="console-log" class="console-log">
                                    <div class="log-line info">[系统] 准备就绪，等待开始注册...</div>
                                </div>
                            </div>
                        </div>

                        <!-- 已注册账号列表 -->
                        <div class="card">
                            <div class="card-header">
                                <h3>📋 最近注册</h3>
                                <div style="display: flex; gap: var(--semi-spacing-2);">
                                    <button type="button" class="btn btn-ghost btn-sm" id="refresh-accounts-btn">🔄 刷新</button>
                                    <a href="/accounts" class="btn btn-secondary btn-sm">查看全部</a>
                                </div>
                            </div>
                            <div class="card-body no-padding">
                                <div class="recent-accounts-table">
                                    <table class="data-table">
                                        <thead>
                                            <tr>
                                                <th style="width: 50px;">ID</th>
                                                <th>邮箱</th>
                                                <th style="width: 100px;">密码</th>
                                                <th style="width: 70px;">状态</th>
                                            </tr>
                                        </thead>
                                        <tbody id="recent-accounts-table">
                                            <tr>
                                                <td colspan="4">
                                                    <div class="empty-state" style="padding: var(--semi-spacing-4);">
                                                        <div class="empty-state-icon">📭</div>
                                                        <div class="empty-state-title">暂无已注册账号</div>
                                                    </div>
                                                </td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="/static/js/utils.js?v={{ static_version }}"></script>
    <script src="/static/js/app.js?v={{ static_version }}"></script>
</body>
</html>
