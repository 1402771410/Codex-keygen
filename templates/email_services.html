<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>临时邮箱池 - OpenAI 注册系统</title>
    <link rel="stylesheet" href="https://unpkg.com/@douyinfe/semi-ui@2.72.0/dist/css/semi.min.css">
    <link rel="stylesheet" href="/static/css/style.css?v={{ static_version }}">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📮</text></svg>">
</head>
<body>
    <div class="container">
        <nav class="navbar">
            <div class="nav-brand">
                <h1>OpenAI 注册系统</h1>
            </div>
            <div class="nav-links">
                <a href="/" class="nav-link">注册</a>
                <a href="/accounts" class="nav-link">账号管理</a>
                <a href="/email-services" class="nav-link active">邮箱服务</a>
                <a href="/payment" class="nav-link">支付</a>
                <a href="/settings" class="nav-link">设置</a>
                <a href="/logout" class="nav-link">退出</a>
            </div>
            <button type="button" class="theme-toggle" onclick="theme.toggle()" title="切换主题">🌙</button>
        </nav>

        <main class="main-content">
            <div class="page-header">
                <h2>临时邮箱池管理</h2>
                <p class="subtitle">仅保留临时邮箱注册：可维护规则、启停规则，并在注册时按轮询策略自动选择。</p>
            </div>

            <div class="stats-grid">
                <div class="stat-card info">
                    <div class="stat-value" id="rules-total">0</div>
                    <div class="stat-label">规则总数</div>
                </div>
                <div class="stat-card success">
                    <div class="stat-value" id="rules-enabled">0</div>
                    <div class="stat-label">启用规则</div>
                </div>
                <div class="stat-card warning">
                    <div class="stat-value" id="global-enabled-text">-</div>
                    <div class="stat-label">全局开关</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="global-base-url-text">-</div>
                    <div class="stat-label">全局 API</div>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <h3>🌐 全局临时邮箱配置</h3>
                </div>
                <div class="card-body">
                    <form id="global-tempmail-form">
                        <div class="form-group">
                            <label for="global-base-url">默认 API 地址</label>
                            <input type="text" id="global-base-url" name="base_url" placeholder="https://api.tempmail.lol/v2" required>
                        </div>
                        <div class="form-group">
                            <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
                                <input type="checkbox" id="global-enabled"> 启用全局临时邮箱
                            </label>
                        </div>
                        <div class="form-actions">
                            <button type="submit" class="btn btn-primary">💾 保存全局配置</button>
                            <button type="button" class="btn btn-secondary" id="test-global-tempmail-btn">🔌 测试全局连接</button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <h3>📮 临时邮箱规则列表</h3>
                    <button type="button" class="btn btn-primary btn-sm" id="add-rule-btn">➕ 添加规则</button>
                </div>
                <div class="card-body" style="padding: 0;">
                    <div class="table-container">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th style="width: 60px;">ID</th>
                                    <th>规则名称</th>
                                    <th>规则内容</th>
                                    <th style="width: 80px;">优先级</th>
                                    <th style="width: 100px;">状态</th>
                                    <th style="width: 180px;">最后使用</th>
                                    <th style="width: 210px;">操作</th>
                                </tr>
                            </thead>
                            <tbody id="tempmail-rules-table">
                                <tr>
                                    <td colspan="7">
                                        <div class="empty-state">
                                            <div class="empty-state-icon">⏳</div>
                                            <div class="empty-state-title">加载中...</div>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div class="modal" id="rule-modal">
        <div class="modal-content" style="max-width: 640px;">
            <div class="modal-header">
                <h3 id="rule-modal-title">添加临时邮箱规则</h3>
                <button type="button" class="modal-close" id="close-rule-modal">&times;</button>
            </div>
            <div class="modal-body">
                <form id="rule-form">
                    <input type="hidden" id="rule-id">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="rule-name">规则名称</label>
                            <input type="text" id="rule-name" required placeholder="例如：OpenAI 专用规则">
                        </div>
                        <div class="form-group">
                            <label for="rule-priority">优先级（越小越靠前）</label>
                            <input type="number" id="rule-priority" min="0" value="0">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="rule-base-url">API 地址（留空则使用全局）</label>
                        <input type="text" id="rule-base-url" placeholder="https://api.tempmail.lol/v2">
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="rule-address-prefix">邮箱前缀规则（可选）</label>
                            <input type="text" id="rule-address-prefix" placeholder="例如：openai_user">
                        </div>
                        <div class="form-group">
                            <label for="rule-preferred-domain">优先域名（可选）</label>
                            <input type="text" id="rule-preferred-domain" placeholder="例如：mail.example.com">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="rule-timeout">超时时间（秒）</label>
                            <input type="number" id="rule-timeout" min="5" value="30">
                        </div>
                        <div class="form-group">
                            <label for="rule-max-retries">最大重试次数</label>
                            <input type="number" id="rule-max-retries" min="1" value="3">
                        </div>
                    </div>

                    <div class="form-group">
                        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
                            <input type="checkbox" id="rule-enabled" checked> 启用该规则
                        </label>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">💾 保存规则</button>
                        <button type="button" class="btn btn-secondary" id="cancel-rule-btn">取消</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="/static/js/utils.js?v={{ static_version }}"></script>
    <script src="/static/js/email_services.js?v={{ static_version }}"></script>
</body>
</html>
