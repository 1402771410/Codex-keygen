<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>临时邮箱池 - OpenAI 注册系统</title>
    <link rel="stylesheet" href="https://unpkg.com/@douyinfe/semi-ui@2.72.0/dist/css/semi.min.css">
    <link rel="stylesheet" href="/static/css/style.css?v={{ static_version }}">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📮</text></svg>">
</head>
<body>
    <!-- 新布局：左侧导航栏 Shell -->
    <div class="app-shell">
        <!-- 左侧导航栏 -->
        <aside class="sidebar">
            <div class="sidebar-brand">
                <div class="sidebar-brand-icon">🚀</div>
                <span class="sidebar-brand-text">OpenAI 注册</span>
            </div>
            
            <nav class="sidebar-nav">
                <div class="sidebar-section">
                    <div class="sidebar-section-title">控制台</div>
                    <a href="/" class="sidebar-link">
                        <span class="sidebar-link-icon">📝</span>
                        <span>注册</span>
                    </a>
                    <a href="/accounts" class="sidebar-link">
                        <span class="sidebar-link-icon">📋</span>
                        <span>账号管理</span>
                    </a>
                    <a href="/email-services" class="sidebar-link active">
                        <span class="sidebar-link-icon">📮</span>
                        <span>邮箱服务</span>
                    </a>
                </div>
                
                <div class="sidebar-section">
                    <div class="sidebar-section-title">工具</div>
                    <a href="/payment" class="sidebar-link">
                        <span class="sidebar-link-icon">💳</span>
                        <span>支付升级</span>
                    </a>
                    <a href="/settings" class="sidebar-link">
                        <span class="sidebar-link-icon">⚙️</span>
                        <span>系统设置</span>
                    </a>
                </div>
            </nav>
            
            <div class="sidebar-footer">
                <button type="button" class="theme-toggle-btn" onclick="theme.toggle()" title="切换主题">🌙</button>
                <a href="/logout" class="logout-link">退出</a>
            </div>
        </aside>

        <!-- 主内容区 -->
        <main class="main-wrapper">
            <header class="page-header-bar">
                <div class="page-title-section">
                    <h1>📮 临时邮箱池</h1>
                    <p>支持多供应商调用方式、固定内置规则保护，以及单服务/多服务轮询模式。</p>
                </div>
            </header>

            <div class="page-content">
                <div class="stats-grid">
                    <div class="stat-card info">
                        <div class="stat-value" id="rules-total">0</div>
                        <div class="stat-label">规则总数</div>
                    </div>
                    <div class="stat-card success">
                        <div class="stat-value" id="rules-enabled">0</div>
                        <div class="stat-label">启用规则</div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <h3>📮 临时邮箱规则列表</h3>
                        <button type="button" class="btn btn-primary btn-sm" id="add-rule-btn">➕ 添加规则</button>
                    </div>
                    <div class="card-body" style="padding: 0;">
                        <div class="table-container">
                            <table class="data-table">
                                <thead>
                                    <tr>
                                        <th style="width: 50px;">ID</th>
                                        <th>规则名称</th>
                                        <th style="width: 140px;">供应商</th>
                                        <th>规则内容</th>
                                        <th style="width: 60px;">优先级</th>
                                        <th style="width: 70px;">状态</th>
                                        <th style="width: 160px;">操作</th>
                                    </tr>
                                </thead>
                                <tbody id="tempmail-rules-table">
                                    <tr>
                                        <td colspan="7">
                                            <div class="empty-state">
                                                <div class="empty-state-icon">⏳</div>
                                                <div class="empty-state-title">加载中...</div>
                                            </div>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div class="modal" id="rule-modal">
        <div class="modal-content" style="max-width: 580px;">
            <div class="modal-header">
                <h3 id="rule-modal-title">添加临时邮箱规则</h3>
                <button type="button" class="modal-close" id="close-rule-modal">&times;</button>
            </div>
            <div class="modal-body">
                <form id="rule-form">
                    <input type="hidden" id="rule-id">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="rule-name">规则名称</label>
                            <input type="text" id="rule-name" required placeholder="例如：OpenAI 专用规则">
                        </div>
                        <div class="form-group">
                            <label for="rule-provider">供应商调用方式</label>
                            <select id="rule-provider" required></select>
                        </div>
                        <div class="form-group">
                            <label for="rule-priority">优先级（越小越靠前）</label>
                            <input type="number" id="rule-priority" min="0" value="0">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="rule-base-url">API 地址（留空则使用全局）</label>
                        <input type="text" id="rule-base-url" placeholder="https://api.tempmail.lol/v2">
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="rule-address-prefix">邮箱前缀规则（可选）</label>
                            <input type="text" id="rule-address-prefix" placeholder="例如：openai_user">
                        </div>
                        <div class="form-group">
                            <label for="rule-preferred-domain">优先域名（可选）</label>
                            <input type="text" id="rule-preferred-domain" placeholder="例如：mail.example.com">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="rule-timeout">超时时间（秒）</label>
                            <input type="number" id="rule-timeout" min="5" value="30">
                        </div>
                        <div class="form-group">
                            <label for="rule-max-retries">最大重试次数</label>
                            <input type="number" id="rule-max-retries" min="1" value="3">
                        </div>
                    </div>

                    <div class="form-group">
                        <label style="display:flex;align-items:center;gap:var(--semi-spacing-2);cursor:pointer;">
                            <input type="checkbox" id="rule-enabled" checked> 启用该规则
                        </label>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">💾 保存规则</button>
                        <button type="button" class="btn btn-secondary" id="cancel-rule-btn">取消</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="/static/js/utils.js?v={{ static_version }}"></script>
    <script src="/static/js/email_services.js?v={{ static_version }}"></script>
</body>
</html>
