<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>支付升级 - OpenAI 注册系统</title>
    <link rel="stylesheet" href="https://unpkg.com/@douyinfe/semi-ui@2.72.0/dist/css/semi.min.css">
    <link rel="stylesheet" href="/static/css/style.css?v={{ static_version }}">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💳</text></svg>">
    <style>
        /* 支付页面特定样式 */
        .plan-cards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--semi-spacing-4);
            margin-bottom: var(--semi-spacing-5);
        }
        
        .plan-card {
            position: relative;
            border: 2px solid var(--semi-border-color-light);
            border-radius: var(--semi-radius-remote);
            padding: var(--semi-spacing-5);
            cursor: pointer;
            transition: all var(--semi-motion-duration-fast) var(--semi-motion-ease-out);
            text-align: center;
        }
        
        .plan-card:hover {
            border-color: var(--semi-color-primary);
            box-shadow: var(--semi-shadow-2);
        }
        
        .plan-card.selected {
            border-color: var(--semi-color-primary);
            background: var(--semi-color-primary-light);
            box-shadow: 0 0 0 2px rgba(0, 119, 250, 0.2);
        }
        
        .plan-card h3 {
            margin: 0 0 var(--semi-spacing-2);
            font-size: 1.2857rem;
            font-weight: 600;
        }
        
        .plan-card p {
            margin: 0;
            color: var(--semi-color-text-2);
            font-size: 0.8571rem;
        }
        
        .team-options { display: none; }
        .team-options.show { display: block; }
        
        .link-box {
            display: none;
            margin-top: var(--semi-spacing-4);
        }
        
        .link-box.show { display: block; }
        
        .link-text {
            width: 100%;
            font-family: var(--semi-font-mono);
            font-size: 0.7857rem;
            padding: var(--semi-spacing-3);
            border: 1px solid var(--semi-border-color);
            border-radius: var(--semi-radius-base);
            background: var(--semi-color-bg-1);
            color: var(--semi-color-text-0);
            resize: vertical;
            min-height: 80px;
        }
    </style>
</head>
<body>
    <!-- 新布局：左侧导航栏 Shell -->
    <div class="app-shell">
        <!-- 左侧导航栏 -->
        <aside class="sidebar">
            <div class="sidebar-brand">
                <div class="sidebar-brand-icon">🚀</div>
                <span class="sidebar-brand-text">OpenAI 注册</span>
            </div>
            
            <nav class="sidebar-nav">
                <div class="sidebar-section">
                    <div class="sidebar-section-title">控制台</div>
                    <a href="/" class="sidebar-link">
                        <span class="sidebar-link-icon">📝</span>
                        <span>注册</span>
                    </a>
                    <a href="/accounts" class="sidebar-link">
                        <span class="sidebar-link-icon">📋</span>
                        <span>账号管理</span>
                    </a>
                    <a href="/email-services" class="sidebar-link">
                        <span class="sidebar-link-icon">📮</span>
                        <span>邮箱服务</span>
                    </a>
                </div>
                
                <div class="sidebar-section">
                    <div class="sidebar-section-title">工具</div>
                    <a href="/payment" class="sidebar-link active">
                        <span class="sidebar-link-icon">💳</span>
                        <span>支付升级</span>
                    </a>
                    <a href="/settings" class="sidebar-link">
                        <span class="sidebar-link-icon">⚙️</span>
                        <span>系统设置</span>
                    </a>
                </div>
            </nav>
            
            <div class="sidebar-footer">
                <button type="button" class="theme-toggle-btn" onclick="theme.toggle()" title="切换主题">🌙</button>
                <a href="/logout" class="logout-link">退出</a>
            </div>
        </aside>

        <!-- 主内容区 -->
        <main class="main-wrapper">
            <header class="page-header-bar">
                <div class="page-title-section">
                    <h1>💳 支付升级</h1>
                    <p>为账号生成 Plus 或 Team 订阅支付链接</p>
                </div>
            </header>

            <div class="page-content">
                <div class="card">
                    <div class="card-header">
                        <h3>选择套餐</h3>
                    </div>
                    <div class="card-body">
                        <!-- 套餐选择 -->
                        <div class="plan-cards">
                            <div class="plan-card selected" id="plan-plus" onclick="selectPlan('plus')">
                                <h3>Plus</h3>
                                <p>个人订阅，$20/月</p>
                            </div>
                            <div class="plan-card" id="plan-team" onclick="selectPlan('team')">
                                <h3>Team</h3>
                                <p>团队订阅，按座位计费</p>
                            </div>
                        </div>

                        <!-- 账号选择 -->
                        <div class="form-group">
                            <label for="account-select">选择账号</label>
                            <select id="account-select" style="width:100%">
                                <option value="">-- 加载中... --</option>
                            </select>
                        </div>

                        <!-- 国家选择 -->
                        <div class="form-row">
                            <div class="form-group">
                                <label for="country-select">计费国家</label>
                                <select id="country-select" onchange="onCountryChange()">
                                    <option value="SG">新加坡 (SGD)</option>
                                    <option value="US">美国 (USD)</option>
                                    <option value="TR">土耳其 (TRY)</option>
                                    <option value="JP">日本 (JPY)</option>
                                    <option value="HK">香港 (HKD)</option>
                                    <option value="GB">英国 (GBP)</option>
                                    <option value="AU">澳大利亚 (AUD)</option>
                                    <option value="CA">加拿大 (CAD)</option>
                                    <option value="IN">印度 (INR)</option>
                                    <option value="BR">巴西 (BRL)</option>
                                    <option value="MX">墨西哥 (MXN)</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>对应货币</label>
                                <input type="text" id="currency-display" value="SGD" readonly style="background:var(--semi-color-bg-2);cursor:default">
                            </div>
                        </div>

                        <!-- Team 额外参数 -->
                        <div class="team-options" id="team-options">
                            <div class="form-row">
                                <div class="form-group">
                                    <label for="workspace-name">工作区名称</label>
                                    <input type="text" id="workspace-name" value="MyTeam" placeholder="MyTeam">
                                </div>
                                <div class="form-group">
                                    <label for="seat-quantity">座位数量</label>
                                    <input type="number" id="seat-quantity" value="5" min="1" max="100">
                                </div>
                                <div class="form-group">
                                    <label for="price-interval">计费周期</label>
                                    <select id="price-interval">
                                        <option value="month">月付</option>
                                        <option value="year">年付</option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <!-- 操作区 -->
                        <div class="form-actions">
                            <button type="button" class="btn btn-primary" onclick="generateLink()">生成支付链接</button>
                        </div>

                        <!-- 链接结果 -->
                        <div class="link-box" id="link-box">
                            <label>支付链接</label>
                            <textarea class="link-text" id="link-text" readonly></textarea>
                            <div class="form-actions" style="margin-top:var(--semi-spacing-3)">
                                <button type="button" class="btn btn-secondary" onclick="copyLink()">复制链接</button>
                                <button type="button" class="btn btn-primary" onclick="openIncognito()">无痕打开浏览器</button>
                            </div>
                            <p class="hint" id="open-status"></p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="/static/js/utils.js?v={{ static_version }}"></script>
    <script src="/static/js/payment.js?v={{ static_version }}"></script>
</body>
</html>
